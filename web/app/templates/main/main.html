{%  load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Loan Amount Predictor</title>

    <link rel="icon" type="image/x-icon" href="{%  static 'images/icon.png' %}">
    <link rel="stylesheet" href="{%  static 'stylesheets/main.css' %}">
</head>

<body>

    <h1>Loan Amount Predictor App</h1>

    <form action="{%  url 'main' %}" method="post">
        {% csrf_token %}

        <h2>Annual Income</h2>
        <input type="text" name="annual-income" placeholder="Annual Income Write Here">

        <h2>Interest Rate</h2>
        <input type="text" name="interest-rate" placeholder="Interest Rate Write Here">

        <h2>Credit Score</h2>
        <input type="text" name="credit-score" placeholder="Credit Score Write Here">

        <h2>Existing Monthly Debt</h2>
        <input type="text" name="monthly-debt" placeholder="Monthly Debt Write Here">

        <h2>Down Payment</h2>
        <input type="text" name="down-payment" placeholder="Down Payment Write Here">

        <button type="submit">Calculate</button>
    </form>

</body>

</html>
